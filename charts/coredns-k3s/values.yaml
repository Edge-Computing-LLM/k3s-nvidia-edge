enabled: false

namespace: kube-system
clusterDomain: cluster.local
clusterDNS: 10.43.0.10
clusterDNSList:
  - 10.43.0.10

image:
  repository: rancher/mirrored-coredns-coredns
  tag: "1.14.4"
  pullPolicy: IfNotPresent

replicaCount: 1
revisionHistoryLimit: 0

resources:
  limits:
    memory: 170Mi
  requests:
    cpu: 100m
    memory: 70Mi

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

service:
  name: kube-dns
  metricsPort: 9153

serviceAccount:
  name: coredns

customConfigMap:
  name: coredns-custom
